[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "MPL-2.0", "CDLA-Permissive-2.0", "OpenSSL"]

[advisories]
yanked = "deny"
ignore = [
    # `paste` is feature-complete and was marked "no longer maintained" by its
    # author (dtolnay) — it is NOT a vulnerability. It is pulled in transitively
    # by ratatui 0.29 (TUI macros) and has no safe upgrade. Scoped to this single
    # advisory ID so any other unmaintained/vulnerable crate still fails the gate.
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "allow"
