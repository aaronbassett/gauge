# cargo-dist ("dist") configuration — the release BACK-END's artifact builder.
#
# Drives `dist build` (per-target archives + checksums + the shell installer(s) +
# the Homebrew formula). It is the source of truth for WHAT a tagged release
# produces. The CI workflow that calls it (.github/workflows/release.yml) is
# HAND-AUTHORED, not generated by `dist generate` — hence `allow-dirty = ["ci"]`
# below. Do not run `dist init` / `dist generate` without re-reconciling
# release.yml afterwards (it would try to overwrite the hand-authored workflow).
#
# Two binary apps are distributed: the client `gauge` and the server
# `gauge-server`. The three library crates have no binaries, so dist ignores them
# automatically. Both apps ship GitHub-release archives + a shell installer; only
# the CLIENT gets a Homebrew formula (gauge-server overrides `installers` to
# ["shell"] in crates/gauge-server/Cargo.toml).

[workspace]
members = ["cargo:."]

[dist]
# Pin the exact dist version the workflow installs (reproducibility).
cargo-dist-version = "0.32.0"

# CI backend. We hand-author release.yml, so `allow-dirty = ["ci"]` stops dist
# from checking/regenerating it.
ci = "github"
allow-dirty = ["ci"]

# Explicit app allow-list. The libraries (gauge-auth, gauge-events, gauge-query)
# have no binaries and are skipped regardless; listing the two apps makes intent
# clear and guards against accidental inclusion. The client crate is named
# `gauge-client` on crates.io but builds the `gauge` binary / `gauge.rb` formula.
packages = ["gauge-client", "gauge-server"]

# Self-contained prebuilt binaries for Apple-silicon macOS and Linux
# (x86_64 + aarch64). Intel macOS and Windows are intentionally out of scope.
targets = [
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]

# Default installers for all apps. `installers` is package-local, so this is the
# baseline: `gauge` keeps both; `gauge-server` REPLACES it with ["shell"] in its
# Cargo.toml, so only `gauge` produces a Homebrew formula (`gauge.rb`).
installers = ["shell", "homebrew"]

# NOTE on the Homebrew tap: dist's own `tap` / `publish-jobs` keys are
# intentionally NOT set here, because the formula push is performed by the
# hand-authored `publish-homebrew-tap` job in release.yml (which hardcodes the
# target tap `aaronbassett/homebrew-tap`). dist only needs to GENERATE the
# formula (via `installers = ["homebrew"]`); the tap name is not embedded in the
# generated `gauge.rb`, so omitting `tap` here avoids a misleading
# "publish job disabled" warning without changing the artifact.

# Releases are hosted as GitHub Releases.
hosting = "github"

# Build each app in its own invocation (correct cross-target builds; required
# when only a subset of the workspace is released).
precise-builds = true

# Build against the committed Cargo.lock so a tagged artifact matches the
# audited dependency set exactly. (The committed Cargo.lock is the real
# guarantee; this flag makes the intent explicit.)
cargo-build-args = ["--locked"]

# Linux builds target the Ubuntu 22.04 glibc baseline (2.35) so the binaries run
# across mainstream distributions.
[dist.github-custom-runners]
x86_64-unknown-linux-gnu = "ubuntu-22.04"
aarch64-unknown-linux-gnu = "ubuntu-22.04-arm"
